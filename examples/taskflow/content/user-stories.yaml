- as: 忙碌的開發者
  want: 按下 ⌘+N 立刻進入輸入狀態，且無須等待網路回應
  soThat: 能夠在靈感迸發的瞬間完成紀錄，打斷思緒的視覺與操作延遲縮短至 100ms 以內。
  priority: p0
- as: 通勤中的使用者
  want: 在捷運或飛機等斷網環境下，依然能新增、編輯或勾選任務
  soThat: 系統能自動處理衝突並在恢復連線時無感同步，確保資料的一致性與可靠性。
  priority: p0
- as: 多裝置使用者
  want: 在 Mac 桌面端輸入的內容，能即時推播至手機 App 並更新 UI
  soThat: 無須手動重新載入或下拉重新整理，維持工作流的連續性。
  priority: p1
- as: 視覺整理控
  want: 透過階層式標籤 (Nested Tags) 分組任務，並支援收合次要群組
  soThat: 專注於當前最重要的 3-5 個任務，降低長篇待辦清單帶來的焦慮感。
  priority: p2
